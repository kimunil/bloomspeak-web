services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
      POSTGRES_DB: bloom
    ports: ["5432:5432"]
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://bloom:bloom@db:5432/bloom
    ports: ["8000:8000"]
    depends_on: [db]
