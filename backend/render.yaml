services:
  - type: web
    name: bloomspeak-api
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MIN
        value: "10080"
      - key: CORS_ORIGINS
        value: "https://bloomspeak.kr,https://www.bloomspeak.kr"
      - key: DATABASE_URL
        value: "sqlite:///./bloom.db"
      - key: APP_DEEP_LINK_SCHEME
        value: "bloomspeak"
      - key: OAUTH_REDIRECT_BASE
        value: "https://api.bloomspeak.kr"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
